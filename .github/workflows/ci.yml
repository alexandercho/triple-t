name: Lint

on:
    pull_request:
        branches:
            - develop
            - main
    push:

jobs:
    lint_frontend:
        name: Lint Frontend
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
                  cache-dependency-path: frontend/pnpm-lock.yaml
            - run: pnpm --dir frontend install --frozen-lockfile
            - run: pnpm --dir frontend lint

    lint_backend:
        name: Lint Backend
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: pnpm
                  cache-dependency-path: backend/pnpm-lock.yaml
            - run: pnpm --dir backend install --frozen-lockfile
            - run: pnpm --dir backend lint

    validate_main_pr_source:
        name: Check Main PR Source
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        steps:
            - name: Ensure only develop can merge into main
              run: |
                  if [ "${{ github.head_ref }}" != "develop" ]; then
                      echo "Only the develop branch can be merged into main."
                      exit 1
                  fi
